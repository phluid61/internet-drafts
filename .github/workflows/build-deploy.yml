name: Build and deploy drafts

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - '*/draft.md'
      - '*/Makefile'
      - 'rebuild'

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install build tools
        run: |
          gem install kramdown-rfc2629
          pip install xml2rfc

      - name: Build drafts
        run: ./rebuild -B

      - name: Collect artefacts
        run: |
          mkdir -p /tmp/drafts
          for dir in */; do
            [ -f "$dir/draft.md" ] || continue
            name=${dir%/}
            mkdir -p "/tmp/drafts/$name"
            cp "$name"/draft-*.xml "$name"/draft-*.html "$name"/draft-*.txt \
               "/tmp/drafts/$name/" 2>/dev/null || true
          done

      - name: Deploy to gh-pages
        run: |
          git checkout gh-pages
          for dir in /tmp/drafts/*/; do
            name=$(basename "$dir")
            mkdir -p "$name"
            cp "$dir"* "$name/"
            latest=$(ls "$name"/draft-*-*.html 2>/dev/null | sort | tail -1)
            if [ -n "$latest" ]; then
              cp "$latest" "$name/index.html"
            fi
          done
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy drafts from main"
            git push
          fi
